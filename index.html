<!doctype html>
<html lang="en" data-vibrant-palette="true">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Habitrack</title>
    <style>
      @font-face {
        font-display: swap;
        font-family: 'Nunito';
        font-style: normal;
        font-weight: 500;
        src: url('/fonts/nunito-v32-cyrillic_latin-500.woff2') format('woff2');
      }

      @font-face {
        font-display: swap;
        font-family: 'Nunito';
        font-style: normal;
        font-weight: 600;
        src: url('/fonts/nunito-v32-cyrillic_latin-600.woff2') format('woff2');
      }

      @font-face {
        font-display: swap;
        font-family: 'Nunito';
        font-style: italic;
        font-weight: 600;
        src: url('/fonts/nunito-v32-cyrillic_latin-600italic.woff2')
          format('woff2');
      }

      @font-face {
        font-display: swap;
        font-family: 'Nunito';
        font-style: normal;
        font-weight: 700;
        src: url('/fonts/nunito-v32-cyrillic_latin-700.woff2') format('woff2');
      }

      @font-face {
        font-display: swap;
        font-family: 'Nunito';
        font-style: normal;
        font-weight: 800;
        src: url('/fonts/nunito-v32-cyrillic_latin-800.woff2') format('woff2');
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Nunito', sans-serif;
        font-weight: 600;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

        * {
          box-sizing: border-box;
        }
      }

      #root {
        height: 100vh;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;

        &.initialized {
          height: auto;
        }
      }

      html.dark .loader-container {
        background-color: #0d140f;
        color: #e5f5f1;
      }

      .loader-container {
        background-color: #f3fbf7;
        color: #333333;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        height: 100%;

        span {
          font-size: 1rem;
        }

        img {
          width: 26px;
          height: 26px;
          margin-right: 16px;
        }
      }

      .infinity-loader {
        height: calc(var(--uib-size) * (2.1 / 5));
        width: var(--uib-size);
        transform-origin: center;
        overflow: visible;

        .car {
          fill: none;
          stroke: var(--uib-color);
          stroke-dasharray: 15, 85;
          stroke-dashoffset: 0;
          stroke-linecap: round;
          animation: travel var(--uib-speed) linear infinite;
          will-change: stroke-dasharray, stroke-dashoffset;
          transition: stroke 0.5s ease;
        }

        .track {
          stroke: var(--uib-color);
          opacity: var(--uib-bg-opacity);
        }
      }

      @keyframes travel {
        0% {
          stroke-dashoffset: 0;
        }

        100% {
          stroke-dashoffset: 100;
        }
      }
    </style>
    <script>
      const { theme = 'system' } = localStorage;
      const isSystemDark = window.matchMedia(
        '(prefers-color-scheme: dark)'
      ).matches;
      document.documentElement.classList.toggle(
        'dark',
        theme === 'dark' || (theme === 'system' && isSystemDark)
      );
    </script>
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/ldrs/dist/auto/infinity.js"
    ></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="loader-container">
        <l-infinity
          size="36"
          stroke="3"
          stroke-length="0.15"
          bg-opacity="0.25"
          speed="1.3"
          color="oklch(58.01% 0.121 162.81)"
        ></l-infinity>
        <span>We're preparing the app...</span>
      </div>
    </div>
  </body>
  <script type="module" src="/src/index.tsx"></script>
</html>
