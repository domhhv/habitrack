<!doctype html>
<html lang="en" data-vibrant-palette="true">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Habitrack</title>
    <style>
      @font-face {
        font-display: swap;
        font-family: 'Nunito';
        font-style: normal;
        font-weight: 500;
        src: url('/fonts/nunito-v32-cyrillic_latin-500.woff2') format('woff2');
      }

      @font-face {
        font-display: swap;
        font-family: 'Nunito';
        font-style: normal;
        font-weight: 600;
        src: url('/fonts/nunito-v32-cyrillic_latin-600.woff2') format('woff2');
      }

      @font-face {
        font-display: swap;
        font-family: 'Nunito';
        font-style: italic;
        font-weight: 600;
        src: url('/fonts/nunito-v32-cyrillic_latin-600italic.woff2')
          format('woff2');
      }

      @font-face {
        font-display: swap;
        font-family: 'Nunito';
        font-style: normal;
        font-weight: 700;
        src: url('/fonts/nunito-v32-cyrillic_latin-700.woff2') format('woff2');
      }

      @font-face {
        font-display: swap;
        font-family: 'Nunito';
        font-style: normal;
        font-weight: 800;
        src: url('/fonts/nunito-v32-cyrillic_latin-800.woff2') format('woff2');
      }

      body {
        margin: 0;
        padding: 0;
        font-family: 'Nunito', sans-serif;
        font-weight: 600;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

        * {
          box-sizing: border-box;
        }
      }

      #root {
        height: 100vh;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        position: relative;

        &.initialized {
          height: auto;
        }
      }

      html.dark .loader-container {
        background-color: #000;
        color: oklch(99.11% 0.0015 151.41);
      }

      .loader-container {
        color: oklch(21.03% 0.0015 158.77);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        height: 100%;

        span {
          font-size: 1rem;
        }

        img {
          width: 26px;
          height: 26px;
          margin-right: 16px;
        }
      }

      .infinity-loader {
        height: calc(var(--uib-size) * (2.1 / 5));
        width: var(--uib-size);
        transform-origin: center;
        overflow: visible;

        .car {
          fill: none;
          stroke: var(--uib-color);
          stroke-dasharray: 15, 85;
          stroke-dashoffset: 0;
          stroke-linecap: round;
          animation: travel var(--uib-speed) linear infinite;
          will-change: stroke-dasharray, stroke-dashoffset;
          transition: stroke 0.5s ease;
        }

        .track {
          stroke: var(--uib-color);
          opacity: var(--uib-bg-opacity);
        }
      }

      @keyframes travel {
        0% {
          stroke-dashoffset: 0;
        }

        100% {
          stroke-dashoffset: 100;
        }
      }
    </style>
    <script>
      const { theme = 'system' } = localStorage;
      const isSystemDark = window.matchMedia(
        '(prefers-color-scheme: dark)'
      ).matches;
      document.documentElement.classList.toggle(
        'dark',
        theme === 'dark' || (theme === 'system' && isSystemDark)
      );
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="loader-container">
        <svg
          x="0px"
          y="0px"
          width="55"
          height="23.1"
          viewBox="0 0 55 23.1"
          preserveAspectRatio="xMidYMid meet"
          class="infinity-loader"
          style="
            --uib-bg-opacity: 0.25;
            --uib-color: oklch(58.01% 0.121 162.81);
            --uib-size: 36px;
            --uib-speed: 1.3s;
          "
        >
          <path
            fill="none"
            stroke-width="4"
            pathLength="100"
            class="track"
            d="M26.7,12.2c3.5,3.4,7.4,7.8,12.7,7.8c5.5,0,9.6-4.4,9.6-9.5C49,5,45.1,1,39.8,1c-5.5,0-9.5,4.2-13.1,7.8l-3.4,3.3c-3.6,3.6-7.6,7.8-13.1,7.8C4.9,20,1,16,1,10.5C1,5.4,5.1,1,10.6,1c5.3,0,9.2,4.5,12.7,7.8L26.7,12.2z"
          ></path>
          <path
            fill="none"
            class="car"
            stroke-width="4"
            pathLength="100"
            d="M26.7,12.2c3.5,3.4,7.4,7.8,12.7,7.8c5.5,0,9.6-4.4,9.6-9.5C49,5,45.1,1,39.8,1c-5.5,0-9.5,4.2-13.1,7.8l-3.4,3.3c-3.6,3.6-7.6,7.8-13.1,7.8C4.9,20,1,16,1,10.5C1,5.4,5.1,1,10.6,1c5.3,0,9.2,4.5,12.7,7.8L26.7,12.2z"
          ></path>
        </svg>
        <span>We're preparing the app...</span>
      </div>
    </div>
  </body>
  <script type="module" src="/src/index.tsx"></script>
</html>
